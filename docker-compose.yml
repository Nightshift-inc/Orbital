
# Orbital local dev stack.
# `docker compose up` starts all four services plus Postgres and Redis.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbital
      POSTGRES_PASSWORD: orbital
      POSTGRES_DB: orbital_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build: ./src/auth
    environment:
      AUTH_SERVICE_PORT: 4001
      DATABASE_URL: postgres://orbital:orbital@postgres:5432/orbital_dev
      REDIS_URL: redis://redis:6379/0
      SESSION_COOKIE_SECRET: dev-secret-do-not-use-in-prod
    ports:
      - "4001:4001"
    depends_on:
      - postgres
      - redis

  payment-gateway:
    build: ./src/payment
    environment:
      PAYMENT_SERVICE_PORT: 4002
      DATABASE_URL: postgres://orbital:orbital@postgres:5432/orbital_dev
      AUTH_SERVICE_URL: http://auth-service:4001
      STRIPE_API_KEY: sk_test_placeholder
    ports:
      - "4002:4002"
    depends_on:
      - auth-service
      - postgres

  api-gateway:
    build: ./src/gateway
    environment:
      GATEWAY_PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      PAYMENT_SERVICE_URL: http://payment-gateway:4002
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - payment-gateway

  dashboard:
    build: ./src/dashboard
    environment:
      ORBITAL_API_URL: http://api-gateway:4000
      NEXT_PUBLIC_ORBITAL_API_URL: http://localhost:4000
    ports:
      - "4003:4003"
    depends_on:
      - api-gateway

volumes:
  postgres-data:
