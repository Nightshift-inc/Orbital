name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'src/dashboard/**'

jobs:
  deploy:
    name: Deploy dashboard to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        working-directory: src/dashboard
        run: npm install && npm run build
      - name: Deploy (stub)
        run: echo "Deploying dashboard at SHA ${{ github.sha }}"
